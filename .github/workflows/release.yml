name: Flutter Release

# This workflow triggers whenever you push a tag starting with 'v' (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Flutter requires Java 17 for newer Android builds

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # --- START OF SECRET INJECTION STEPS ---
      
      # (Optional) Uncomment the two lines below if you added an ENV_FILE secret
      # - name: Inject Environment Variables
      #   run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Decode Google Services JSON
        # This step safely injects your Android Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo $GOOGLE_SERVICES_JSON | base64 -d > android/app/google-services.json

      - name: Decode Firebase Options
        # This step safely injects your Dart Firebase configuration
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: echo $FIREBASE_OPTIONS_DART | base64 -d > lib/firebase_options.dart

      # --- END OF SECRET INJECTION STEPS ---

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true